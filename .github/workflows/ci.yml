name: CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to run CI on'
        required: false
        default: ''
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Generate docs
        run: npm run gen-docs

      - name: Run build
        run: npm run build

      - name: Validate Schemas
        run: npm run validate-schemas
