name: PR Preview

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

env:
  DOCS_URL: https://tracking.wetter.com

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        run: npm ci --ignore-scripts
        working-directory: ./docs

      - name: Generate docs
        run: npm run gen-docs

      - name: Build with PR base URL
        run: npm run build
        env:
          DOCUSAURUS_BASE_URL: /pr-${{ github.event.number }}/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload preview to GCS
        run: |
          gsutil -m rsync -r -d docs/build/ gs://${{ secrets.GCS_BUCKET }}/pr-${{ github.event.number }}/

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const previewUrl = `${{ env.DOCS_URL }}/pr-${{ github.event.number }}/`;
            const sha = context.sha.substring(0, 7);
            const body = [
              '## Preview deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Status** | ✅ Ready |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              marker,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  mark-closed:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      pull-requests: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set custom_time on preview objects
        # GCS lifecycle rule (storage.tf) will delete objects with
        # days_since_custom_time >= 30, so setting this now starts the 30-day clock.
        # Open-PR objects never have custom_time set and are therefore never deleted.
        run: |
          gcloud storage objects update \
            --recursive \
            --custom-time="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            gs://${{ secrets.GCS_BUCKET }}/pr-${{ github.event.number }}/

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const previewUrl = `${{ env.DOCS_URL }}/pr-${{ github.event.number }}/`;
            const expires = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000)
              .toISOString().substring(0, 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (!existing) return;

            const body = [
              '## Preview deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Status** | 🔒 PR closed — preview expires ${expires} |`,
              '',
              marker,
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
